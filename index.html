<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="container">
    <div class="header">
        <h1>To Do List</h1>
        <p>Stay organized, stay productive</p>
    </div>

    <div class="input-area">
        <input
                type="text"
                id="task-input"
                placeholder="What needs to be done?"
                autocomplete="off"
        >
        <button class="btn-add" id="add-btn">
            <i class="fas fa-plus"></i> Add
        </button>
    </div>

    <div class="controls">
        <div class="control-group">
            <span class="control-label">Filter</span>
            <div class="chip-group">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="incomplete">Active</button>
                <button class="chip" data-filter="completed">Done</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="control-group">
            <span class="control-label">Sort</span>
            <div class="chip-group">
                <button class="chip active" data-sort="time">
                    <i class="fas fa-clock"></i> Recent
                </button>
                <button class="chip" data-sort="alpha">
                    <i class="fas fa-arrow-down-a-z"></i> A–Z
                </button>
            </div>
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="stat-done">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="stat-pending">0</div>
        </div>
    </div>

    <div id="task-list" class="task-list"></div>
</div>
<script src="script.js"></script>
</body>

</html>
